name: Version bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump type'
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          OLD=$(node -p "require('./packages/omg-parser/package.json').version")
          NEW=$(node -e "
            const [maj, min, pat] = '$OLD'.split('.').map(Number);
            const bump = '${{ inputs.bump }}';
            if (bump === 'major') console.log(\`\${maj + 1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${maj}.\${min + 1}.0\`);
            else console.log(\`\${maj}.\${min}.\${pat + 1}\`);
          ")
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "branch=release/v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $OLD -> $NEW"

      - name: Bump workspace versions and cross-package deps
        env:
          NEW: ${{ steps.version.outputs.new }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const newVersion = process.env.NEW;
          // Packages published to npm and kept in lockstep.
          // omg-vscode is intentionally excluded (independent cadence).
          // omg-linter, omg-importer, omg-mock-server are private internal
          // packages bundled into omg-md-cli / omg-lsp — not published, but
          // kept in lockstep so cross-package devDependency pins stay valid.
          const tracked = new Set([
            'omg-parser', 'omg-compiler', 'omg-lsp', 'omg-md-cli',
            'omg-linter', 'omg-importer', 'omg-mock-server',
          ]);

          for (const dir of fs.readdirSync('packages')) {
            const pkgPath = path.join('packages', dir, 'package.json');
            if (!fs.existsSync(pkgPath)) continue;
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            let changed = false;

            if (tracked.has(pkg.name)) {
              pkg.version = newVersion;
              changed = true;
            }

            for (const field of ['dependencies', 'peerDependencies', 'devDependencies']) {
              const deps = pkg[field];
              if (!deps) continue;
              for (const name of Object.keys(deps)) {
                if (tracked.has(name)) {
                  deps[name] = `^${newVersion}`;
                  changed = true;
                }
              }
            }

            if (changed) {
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated', pkgPath);
            }
          }
          EOF

      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Build and test
        run: |
          npm ci
          npm run build
          npm test

      - name: Commit and push branch
        env:
          NEW: ${{ steps.version.outputs.new }}
          BRANCH: ${{ steps.version.outputs.branch }}
          HUSKY: '0'
        run: |
          git checkout -b "$BRANCH"
          git add package-lock.json packages/*/package.json
          git commit -m "chore: release v$NEW"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          OLD: ${{ steps.version.outputs.old }}
          NEW: ${{ steps.version.outputs.new }}
          BRANCH: ${{ steps.version.outputs.branch }}
          BASE: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "chore: release v$NEW" \
            --body "$(cat <<EOF
          Version bump \`v$OLD\` → \`v$NEW\`.

          Generated by the [Version bump](${{ github.server_url }}/${{ github.repository }}/actions/workflows/version-bump.yml) workflow.

          **On merge:** \`auto-release.yml\` detects the \`chore: release v$NEW\` commit on main, creates the \`v$NEW\` tag + GitHub Release, which triggers \`release.yml\` and publishes to npm. No manual steps required.
          EOF
          )"

      - name: Summary
        env:
          OLD: ${{ steps.version.outputs.old }}
          NEW: ${{ steps.version.outputs.new }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          {
            echo "### Version bumped: $OLD → $NEW"
            echo ""
            echo "PR opened from \`$BRANCH\`. Merging it triggers \`auto-release.yml\`, which tags + creates the GitHub Release and fires \`release.yml\` to publish to npm."
          } >> "$GITHUB_STEP_SUMMARY"
