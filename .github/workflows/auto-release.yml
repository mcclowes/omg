name: Auto release on merge

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    if: "${{ startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version from omg-parser/package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/omg-parser/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$VERSION"

      - name: Create tag and GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if gh release view "v$VERSION" >/dev/null 2>&1; then
              echo "Release v$VERSION already exists, nothing to do"
              exit 0
            fi
            if gh release create "v$VERSION" \
                --target "$GITHUB_SHA" \
                --title "v$VERSION" \
                --generate-notes; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "Failed to create release v$VERSION after 3 attempts" >&2
          exit 1
